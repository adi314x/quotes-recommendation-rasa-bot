version: "3.1"

# ============================================================
# Test Stories — end-to-end conversation tests
# Run with: rasa test
# These mirror real user flows to validate bot behavior.
# ============================================================

stories:

# Test 1: Basic greeting and farewell
- story: test basic greet and goodbye
  steps:
    - user: |
        hello
      intent: greet
    - action: utter_greet
    - user: |
        bye
      intent: goodbye
    - action: utter_goodbye

# Test 2: Motivation full flow with affirm
- story: test motivation full flow
  steps:
    - user: |
        hi
      intent: greet
    - action: utter_greet
    - user: |
        I need motivation
      intent: motivation
    - action: utter_motivation
    - user: |
        yes please
      intent: affirm
    - action: utter_ask_more
    - user: |
        motivate me
      intent: motivation
    - action: utter_motivation
    - user: |
        no thanks
      intent: deny
    - action: utter_goodbye

# Test 3: Handling unrecognized input via fallback
- story: test fallback handling
  steps:
    - user: |
        xyzzy blah random gibberish
      intent: nlu_fallback
    - action: utter_fallback
    - user: |
        I need motivation
      intent: motivation
    - action: utter_motivation
    - user: |
        goodbye
      intent: goodbye
    - action: utter_goodbye

# Test 4: Love quote then switch to funny
- story: test love then funny quote
  steps:
    - user: |
        hey there
      intent: greet
    - action: utter_greet
    - user: |
        give me a love quote
      intent: love
    - action: utter_love
    - user: |
        sure
      intent: affirm
    - action: utter_ask_more
    - user: |
        make me laugh
      intent: funny
    - action: utter_funny
    - user: |
        see you
      intent: goodbye
    - action: utter_goodbye

# Test 5: Success quote full loop
- story: test success quote loop
  steps:
    - user: |
        good morning
      intent: greet
    - action: utter_greet
    - user: |
        quotes on success
      intent: success
    - action: utter_success
    - user: |
        give me more
      intent: affirm
    - action: utter_ask_more
    - user: |
        I want to be successful
      intent: success
    - action: utter_success
    - user: |
        that'll do
      intent: deny
    - action: utter_goodbye
