# ============================================================
# Configuration for Quotes Recommendation Chatbot
# Defines the NLU pipeline and dialogue policies.
# ============================================================

# Unique identifier for this assistant
assistant_id: quotes_recommendation_chatbot

# Language setting for the NLU model
language: en

# ============================================================
# NLU Pipeline — processes user messages to extract intents
# ============================================================
pipeline:
  # Step 1: Tokenize text using whitespace boundaries
  - name: WhitespaceTokenizer

  # Step 2: Use regex patterns defined in nlu.yml as features
  - name: RegexFeaturizer

  # Step 3: Add lexical and syntactic features (POS-like)
  - name: LexicalSyntacticFeaturizer

  # Step 4: Bag-of-words featurizer at the word level
  - name: CountVectorsFeaturizer
    analyzer: word

  # Step 5: Character n-gram featurizer for typo robustness
  - name: CountVectorsFeaturizer
    analyzer: char_wb
    min_ngram: 1
    max_ngram: 4

  # Step 6: DIET classifier for intent classification and entity extraction
  - name: DIETClassifier
    epochs: 100
    constrain_similarities: true

  # Step 7: Map entity synonyms to canonical values
  - name: EntitySynonymMapper

  # Step 8: Response selector for retrieval-based responses
  - name: ResponseSelector
    epochs: 100

  # Step 9: Fallback classifier for low-confidence predictions
  - name: FallbackClassifier
    threshold: 0.3
    ambiguity_threshold: 0.1

# ============================================================
# Dialogue Policies — decide the next action in conversation
# ============================================================
policies:
  # Policy 1: Memorize exact conversation patterns from stories
  - name: MemoizationPolicy

  # Policy 2: Rule-based policy for deterministic single-turn actions
  - name: RulePolicy
    core_fallback_threshold: 0.3
    core_fallback_action_name: "action_default_fallback"
    enable_fallback_prediction: true

  # Policy 3: Transformer Embedding Dialogue policy for generalization
  - name: TEDPolicy
    max_history: 5
    epochs: 100
    constrain_similarities: true
