# ============================================================
# Endpoints Configuration for Quotes Recommendation Chatbot
# ============================================================
#
# This file configures external services that Rasa connects to:
#
#   action_endpoint  — URL for the custom action server (Rasa SDK)
#   tracker_store    — Database to persist conversation history
#   lock_store       — Distributed lock for multi-instance deployments
#
# For local development, only the action_endpoint is needed.
# Uncomment other sections when deploying to production.
# ============================================================

# --- Custom Action Server ---
# The Rasa SDK action server handles custom actions defined in actions/
# Start it with: rasa run actions
action_endpoint:
  url: "http://localhost:5055/webhook"

# --- PostgreSQL Tracker Store (uncomment for production) ---
# Stores conversation history in a PostgreSQL database.
# tracker_store:
#   type: SQL
#   dialect: "postgresql"
#   url: "localhost"
#   port: 5432
#   db: "rasa_tracker"
#   username: "rasa_user"
#   password: "your_password_here"

# --- MongoDB Tracker Store (alternative to PostgreSQL) ---
# Stores conversation history in a MongoDB database.
# tracker_store:
#   type: mongod
#   url: "mongodb://localhost:27017"
#   db: "rasa"
#   collection: "conversations"

# --- Redis Lock Store (for multi-instance deployments) ---
# Ensures only one Rasa instance processes a conversation at a time.
# lock_store:
#   type: "redis"
#   url: "localhost"
#   port: 6379
#   password: "your_redis_password_here"
#   db: 1
