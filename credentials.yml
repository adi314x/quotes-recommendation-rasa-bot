# ============================================================
# Credentials Configuration for Quotes Recommendation Chatbot
# ============================================================
#
# This file configures the input channels your bot connects to.
# Uncomment a channel section and fill in your credentials to
# enable it. For local development, REST and SocketIO are
# enabled by default with no authentication required.
#
# After editing, restart the Rasa server for changes to take effect.
# Run the server with: rasa run --enable-api --cors "*"
# ============================================================

# --- REST channel (enabled for local development) ---
# Access at: http://localhost:5005/webhooks/rest/webhook
rest:
  # No token needed for local development
  # token: "your_secret_token"

# --- Socket.IO channel (enabled for web widget integration) ---
# Use the Rasa Webchat widget or a custom frontend with Socket.IO
socketio:
  user_message_evt: user_uttered
  bot_message_evt: bot_uttered
  session_persistence: true

# --- Facebook Messenger (uncomment and fill in to enable) ---
# facebook:
#   verify: "your_facebook_verify_token"
#   secret: "your_facebook_app_secret"
#   page-access-token: "your_facebook_page_access_token"

# --- Slack (uncomment and fill in to enable) ---
# slack:
#   slack_token: "xoxb-your-slack-bot-token"
#   slack_channel: "your_slack_channel_id"
#   slack_signing_secret: "your_slack_signing_secret"

# --- Telegram (uncomment and fill in to enable) ---
# telegram:
#   access_token: "your_telegram_bot_token"
#   verify: "your_telegram_bot_username"
#   webhook_url: "https://your-domain.com/webhooks/telegram/webhook"
