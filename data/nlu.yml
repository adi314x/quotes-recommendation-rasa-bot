version: "3.1"

# ============================================================
# NLU Training Data for Quotes Recommendation Chatbot
# Each intent has 15+ varied, natural-sounding examples
# ============================================================

nlu:

# --- Greeting intent ---
- intent: greet
  examples: |
    - hi
    - hello
    - hey
    - good morning
    - good evening
    - what's up
    - howdy
    - greetings
    - yo
    - sup
    - hi there
    - hey there
    - good afternoon
    - hiya
    - nice to meet you

# --- Goodbye intent ---
- intent: goodbye
  examples: |
    - bye
    - goodbye
    - see you
    - take care
    - later
    - catch you later
    - farewell
    - I'm leaving
    - gotta go
    - peace out
    - see ya
    - good night
    - thanks bye
    - alright bye
    - ciao

# --- Motivation intent ---
- intent: motivation
  examples: |
    - I need motivation
    - feeling lazy
    - give me energy
    - I want to push harder
    - I'm giving up
    - feeling low
    - I need a push
    - motivate me
    - boost me up
    - I feel demotivated
    - I'm tired of trying
    - need some fire
    - help me stay focused
    - I feel like quitting
    - I need strength

# --- Inspiration intent ---
- intent: inspiration
  examples: |
    - inspire me
    - I need inspiration
    - feel stuck
    - need a spark
    - lost my direction
    - I feel lost
    - need clarity
    - give me something to think about
    - I need a new perspective
    - I'm uninspired
    - stir something in me
    - awaken my spirit
    - I need purpose
    - what should I do with my life
    - ignite me

# --- Love intent ---
- intent: love
  examples: |
    - give me a love quote
    - something about love
    - heartfelt quote
    - I miss someone
    - quote on relationships
    - I'm in love
    - my heart is full
    - something romantic
    - quote about feelings
    - love hurts quote
    - sweet quote
    - something about longing
    - I'm heartbroken
    - missing someone
    - quote about connection

# --- Funny intent ---
- intent: funny
  examples: |
    - make me laugh
    - tell me something funny
    - humor quote
    - I need a joke
    - cheer me up
    - something witty
    - lighten my mood
    - I want to smile
    - got any jokes
    - funny quote please
    - say something hilarious
    - I'm bored make me laugh
    - any comedy quotes
    - something sarcastic
    - tickle me

# --- Success intent ---
- intent: success
  examples: |
    - quotes on success
    - achieving goals
    - winning mindset
    - I want to succeed
    - greatness quotes
    - help me win
    - I need to achieve more
    - quote about hard work
    - something about reaching the top
    - I want to be great
    - push me to succeed
    - quote about hustle
    - ambition quotes
    - I want to be successful
    - excellence quotes

# --- Affirm intent (user wants more) ---
- intent: affirm
  examples: |
    - yes
    - sure
    - please
    - go ahead
    - definitely
    - of course
    - yeah
    - yep
    - absolutely
    - why not
    - ok
    - sounds good
    - give me more
    - one more please
    - yes please

# --- Deny intent (user wants to stop) ---
- intent: deny
  examples: |
    - no
    - not now
    - skip
    - never mind
    - that's ok
    - no thanks
    - I'm good
    - maybe later
    - stop
    - enough
    - I'm fine
    - no more
    - nah
    - that'll do
    - no need

# --- Bot challenge intent ---
- intent: bot_challenge
  examples: |
    - are you a bot
    - are you a human
    - am I talking to a bot
    - am I talking to a human
    - are you real
    - are you a robot
    - is this a chatbot
    - who am I talking to
    - are you AI
    - are you artificial intelligence
    - what are you
    - are you a machine
    - tell me if you are a bot
    - you are a bot right
    - is this automated

# ============================================================
# Regex Features — help detect quote-related keywords
# ============================================================
- regex: quote_keyword
  examples: |
    - quote
    - quotes

- regex: inspire_keyword
  examples: |
    - inspire
    - inspiration
    - inspired

- regex: motivate_keyword
  examples: |
    - motivate
    - motivation
    - motivated
