version: "3.1"

# ============================================================
# Rules — deterministic, single-turn conversation behaviors
# Rules are used for actions that should ALWAYS happen the same
# way, regardless of conversation history.
# ============================================================

rules:

# Rule 1: Greet the user at the start of a conversation
- rule: Say greeting when the user greets
  condition:
    - active_loop: null
  steps:
    - intent: greet
    - action: utter_greet

# Rule 2: Say goodbye when the user says goodbye
- rule: Say goodbye when the user says goodbye
  steps:
    - intent: goodbye
    - action: utter_goodbye

# Rule 3: When user affirms, ask if they want more quotes
- rule: Offer more quotes when user affirms
  steps:
    - intent: affirm
    - action: utter_ask_more

# Rule 4: When user denies, say goodbye
- rule: Say goodbye when user denies
  steps:
    - intent: deny
    - action: utter_goodbye

# Rule 5: Handle NLU fallback for low-confidence predictions
- rule: Ask the user to rephrase when NLU confidence is low
  steps:
    - intent: nlu_fallback
    - action: utter_fallback

# Rule 6: Tell the user they are talking to a bot
- rule: Respond to bot challenge
  steps:
    - intent: bot_challenge
    - action: utter_iamabot
